name: Test Hostinger FTP connection

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-ftp:
    name: Verify FTP access and folders
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    env:
      FTP_HOST: ${{ secrets.HOSTINGER_FTP_SERVER }}
      FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      FTP_PORT: ${{ vars.HOSTINGER_FTP_PORT }}

    steps:
      - name: Validate configuration
        shell: bash
        run: |
          test -n "$FTP_HOST" || { echo "Missing HOSTINGER_FTP_SERVER"; exit 1; }
          test -n "$FTP_USER" || { echo "Missing HOSTINGER_FTP_USERNAME"; exit 1; }
          test -n "$FTP_PASSWORD" || { echo "Missing HOSTINGER_FTP_PASSWORD"; exit 1; }
          test -n "$FTP_PORT" || { echo "Missing HOSTINGER_FTP_PORT"; exit 1; }

          echo "Configuration found."
          echo "FTP port: $FTP_PORT"

      - name: Install lftp
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Test FTPS connection
        shell: bash
        run: |
          lftp \
            -u "$FTP_USER","$FTP_PASSWORD" \
            -p "$FTP_PORT" \
            "$FTP_HOST" \
            -e "
              set ftp:passive-mode yes;
              set ftp:ssl-force yes;
              set ftp:ssl-protect-data yes;
              set ssl:verify-certificate no;
              set net:max-retries 2;
              set net:timeout 20;
              set cmd:fail-exit yes;
              pwd;
              cls -la;
              cls -la pdc;
              cls -la programa-intercambio-formativo;
              cls -la selva-adentro;
              cls -la voluntariado-otono-invierno;
              cls -la yerba;
              bye;
            "

      - name: Connection test completed
        shell: bash
        run: |
          echo "FTPS connection succeeded."
          echo "No files were uploaded, modified, or deleted."
